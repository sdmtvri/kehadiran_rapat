<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="./assets/TVRILogo2019.png">
  <title>Kehadiran Rapat TVRI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      box-sizing: border-box;
    }
    
    /* Loading skeleton animation */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .skeleton {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Glass morphism effect */
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }
    
    .glass-input {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border: 1px solid rgba(156, 163, 175, 0.3);
      transition: all 0.3s ease;
    }
    
    .glass-input:focus {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(59, 130, 246, 0.5);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    /* Smooth transition */
    .smooth-transition {
      transition: all 0.5s ease-in-out;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900">
  <div class="container mx-auto px-4 py-8 max-w-3xl"><!-- Header Section -->
   <div id="header-section" class="mb-6">
    <div class="mb-6 flex justify-center"><img src="https://sdmtvri.github.io/assets/TVRILogo2019.png" alt="Logo TVRI" class="h-24 w-auto" style="filter: drop-shadow(0 0 1px white) drop-shadow(0 0 1px white) drop-shadow(0 0 1px white);">
    </div><!-- Loading Skeleton untuk Judul -->
    <div id="title-skeleton" class="skeleton h-9 w-3/4 mx-auto rounded-lg mb-2"></div>
    <div id="date-skeleton" class="skeleton h-5 w-1/2 mx-auto rounded-lg"></div><!-- Judul Rapat (hidden by default) -->
    <h1 id="judul-rapat" class="text-4xl font-bold text-center text-white mb-1 hidden fade-in drop-shadow-lg"></h1>
    <p id="tanggal-rapat" class="text-center text-blue-200 text-lg hidden fade-in"></p>
   </div><!-- Status Inactive Screen -->
   <div id="inactive-screen" class="hidden smooth-transition">
    <div class="glass-card rounded-xl shadow-2xl p-10 text-center">
     <div class="mb-5">
      <div class="bg-gradient-to-r from-amber-500 to-orange-500 p-5 rounded-full inline-block shadow-lg shadow-amber-500/50">
       <svg class="w-14 h-14 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
       </svg>
      </div>
     </div>
     <h2 class="text-3xl font-bold text-gray-800 mb-3">Rapat Belum Dimulai/Telah Berakhir</h2>
     <p class="text-gray-600 text-lg">Silahkan hubungi bagian SDM untuk informasi lebih lanjut.</p>
    </div>
   </div><!-- Form Section -->
   <div id="form-section" class="hidden smooth-transition">
    <form id="employee-form" class="glass-card rounded-xl shadow-2xl p-7"><!-- Role Selection -->
     <div class="mb-4"><label for="role" class="block text-lg font-semibold text-gray-700 mb-2">Kehadiran Sebagai <span style="color: #ef4444;">*</span></label> <select id="role" required class="w-full px-4 py-3 text-lg glass-input rounded-lg text-gray-800 outline-none"> <option value="" class="bg-white">Pilih Kehadiran</option> <option value="Peserta" class="bg-white">Peserta</option> <option value="Narasumber" class="bg-white">Narasumber</option> <option value="Moderator" class="bg-white">Moderator</option> </select>
     </div><!-- Nama Lengkap -->
     <div class="mb-4"><label for="nama" class="block text-lg font-semibold text-gray-700 mb-2">Nama Lengkap <span style="color: #ef4444;">*</span></label> <input type="text" id="nama" required placeholder="Masukkan Nama Lengkap" class="w-full px-4 py-3 text-lg glass-input rounded-lg text-gray-800 placeholder-gray-400 outline-none">
     </div><!-- NIP -->
     <div class="mb-4"><label for="nip" class="block text-lg font-semibold text-gray-700 mb-2">NIP <span style="color: #ef4444;">*</span></label> <input type="text" id="nip" required placeholder="Nomor Induk Pegawai" class="w-full px-4 py-3 text-lg glass-input rounded-lg text-gray-800 placeholder-gray-400 outline-none">
     </div><!-- Nomor HP & Email -->
     <div class="grid grid-cols-2 gap-4 mb-4">
      <div><label for="nomor_hp" class="block text-lg font-semibold text-gray-700 mb-2">Nomor HP <span style="color: #ef4444;">*</span></label> <input type="tel" id="nomor_hp" required placeholder="08xxxxxxxxxx" class="w-full px-4 py-3 text-lg glass-input rounded-lg text-gray-800 placeholder-gray-400 outline-none">
      </div>
      <div><label for="email" class="block text-lg font-semibold text-gray-700 mb-2">Email <span style="color: #ef4444;">*</span></label> <input type="email" id="email" required placeholder="nama@email.com" class="w-full px-4 py-3 text-lg glass-input rounded-lg text-gray-800 placeholder-gray-400 outline-none">
      </div>
     </div><!-- Jabatan -->
     <div class="mb-4"><label for="jabatan" class="block text-lg font-semibold text-gray-700 mb-2">Jabatan <span style="color: #ef4444;">*</span></label> <input type="text" id="jabatan" required placeholder="Jabatan Anda" class="w-full px-4 py-3 text-lg glass-input rounded-lg text-gray-800 placeholder-gray-400 outline-none">
     </div><!-- Satuan Kerja -->
     <div class="mb-4"><label for="satuan_kerja" class="block text-lg font-semibold text-gray-700 mb-2">Satuan Kerja <span style="color: #ef4444;">*</span></label> <input type="text" id="satuan_kerja" required placeholder="Nama Satuan Kerja" class="w-full px-4 py-3 text-lg glass-input rounded-lg text-gray-800 placeholder-gray-400 outline-none">
     </div><!-- Instansi -->
     <div class="mb-4"><label for="instansi" class="block text-lg font-semibold text-gray-700 mb-2">Instansi <span style="color: #ef4444;">*</span></label> <input type="text" id="instansi" required placeholder="Nama Instansi" class="w-full px-4 py-3 text-lg glass-input rounded-lg text-gray-800 placeholder-gray-400 outline-none">
     </div><!-- Signature Section -->
     <div class="mb-6"><label class="block text-lg font-semibold text-gray-700 mb-2 text-center">Tanda Tangan Digital <span style="color: #ef4444;">*</span></label>
      <div class="flex flex-col items-center">
       <div class="glass-input p-3 rounded-lg w-full max-w-md">
        <canvas id="signature-canvas" class="w-full rounded-lg border border-gray-300 bg-white cursor-crosshair" style="height: 150px; touch-action: none;"></canvas><button type="button" id="clear-signature" class="mt-2 w-full px-3 py-2 bg-gradient-to-r from-red-500 to-red-600 text-white rounded-lg hover:from-red-600 hover:to-red-700 transition-all flex items-center justify-center gap-2 font-semibold text-base">
         <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
         </svg> Hapus Tanda Tangan </button>
       </div>
      </div>
     </div><!-- Submit Button --> <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-blue-500 to-cyan-500 text-white py-4 rounded-lg font-bold text-lg hover:from-blue-600 hover:to-cyan-600 transition-all shadow-lg shadow-blue-500/50 hover:shadow-blue-500/70 transform hover:scale-[1.02] flex items-center justify-center gap-2"> <span id="submit-text">Kirim Data Kehadiran</span> <span id="submit-loading" class="hidden">
       <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewbox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle> <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
       </svg></span> </button>
    </form><!-- Success/Error Message -->
    <div id="message-container" class="mt-5 hidden">
     <div id="message" class="p-4 rounded-lg shadow-lg"></div>
    </div><!-- Footer -->
    <div class="mt-8 text-center">
     <p class="text-white text-base font-semibold drop-shadow-lg">© TIM PEPES PEDA</p>
     <p class="text-white text-base font-semibold drop-shadow-lg">SDM LPP TVRI</p>
     <p class="text-blue-200 text-sm mt-1">2025</p>
    </div>
   </div>
  </div>
  <script>
    // URL Google Apps Script Anda (UPDATED)
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1tuQmlwdpc066FFnrXb6uGq12RKE8Kt78DpK3ycQD5YZo-99VyP59JTrSxnkbGi-G/exec';

    // Signature Canvas Setup
    const canvas = document.getElementById('signature-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let isDrawing = false;
    let hasSignature = false;
    let lastX = 0;
    let lastY = 0;
    let signatureData = null; // SIMPAN DATA TANDA TANGAN

    // Set canvas size
    function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    // Simpan data sebelum resize
    const tempData = hasSignature ? canvas.toDataURL() : null;
    
    // Set display size
    canvas.style.width = '100%';
    canvas.style.height = '150px';
    // Set actual canvas size
    canvas.width = rect.width;
    canvas.height = 150;
    
    // Re-apply drawing style setelah resize
    setDrawingStyle();
    
    // Restore gambar setelah resize
    if (tempData) {
        const img = new Image();
        img.onload = function() {
        ctx.drawImage(img, 0, 0);
        };
        img.src = tempData;
    }
    
    console.log('Canvas resized:', canvas.width, 'x', canvas.height);
    }

    // Initialize canvas
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Set drawing style
    function setDrawingStyle() {
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    }

    setDrawingStyle();

    // FUNGSI: Simpan gambar ke variable
    function saveSignatureData() {
    if (hasSignature) {
        signatureData = canvas.toDataURL();
        console.log('Signature data saved');
    }
    }

    // FUNGSI: Restore gambar dari variable
    function restoreSignatureData() {
    if (signatureData) {
        const img = new Image();
        img.onload = function() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        console.log('Signature restored');
        };
        img.src = signatureData;
    }
    }

    // Get mouse/touch position
    function getPosition(e) {
    const rect = canvas.getBoundingClientRect();
    let clientX, clientY;
    
    if (e.type.includes('touch')) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    
    console.log('Position:', x, y);
    return { x, y };
    }

    // Start drawing
    function startDrawing(e) {
    e.preventDefault();
    isDrawing = true;
    const pos = getPosition(e);
    lastX = pos.x;
    lastY = pos.y;
    
    console.log('Start drawing at:', lastX, lastY);
    
    // Draw a dot for single click/tap
    ctx.beginPath();
    ctx.arc(lastX, lastY, 1, 0, Math.PI * 2);
    ctx.fillStyle = '#000000';
    ctx.fill();
    }

    // Draw
    function draw(e) {
    if (!isDrawing) return;
    e.preventDefault();
    
    const pos = getPosition(e);
    
    // Draw line
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    
    lastX = pos.x;
    lastY = pos.y;
    hasSignature = true;
    
    console.log('Drawing to:', pos.x, pos.y);
    }

    // Stop drawing
    function stopDrawing(e) {
    if (isDrawing) {
        e.preventDefault();
        isDrawing = false;
        saveSignatureData(); // SIMPAN saat selesai menggambar
        console.log('Stop drawing');
    }
    }

    // Mouse events
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);

    // Touch events
    canvas.addEventListener('touchstart', startDrawing);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stopDrawing);
    canvas.addEventListener('touchcancel', stopDrawing);

    // Clear signature
    document.getElementById('clear-signature').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasSignature = false;
    signatureData = null; // Reset saved data
    console.log('Canvas cleared');
    });

    // FIX MOBILE SCROLL: Restore canvas saat scroll selesai
    let scrollTimeout;
    window.addEventListener('scroll', function() {
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(function() {
        restoreSignatureData();
    }, 150);
    }, { passive: true });

    // FIX MOBILE: Restore canvas saat visibility berubah
    document.addEventListener('visibilitychange', function() {
    if (!document.hidden) {
        restoreSignatureData();
    }
    });

    // FIX MOBILE: Restore canvas saat page focus kembali
    window.addEventListener('focus', function() {
    restoreSignatureData();
    });

    // Fungsi untuk format tanggal Indonesia
    function formatTanggalIndonesia(dateString) {
    const bulan = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 
                    'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    
    // Parse manual DD/MM/YYYY dari Apps Script
    const parts = dateString.split('/'); // ["06", "02", "2025"]
    const day = parseInt(parts[0], 10);   // 6
    const monthIndex = parseInt(parts[1], 10) - 1; // 1 (Februari index 1)
    const year = parseInt(parts[2], 10);  // 2025
    
    const month = bulan[monthIndex];
    return `${day} ${month} ${year}`;
    }

    // Cache untuk data control
    let controlDataCache = null;
    let cacheTimestamp = null;
    const CACHE_DURATION = 30000; // 30 detik cache

    // Fungsi untuk mendapatkan data control dengan caching
    async function getControlData(forceRefresh = false) {
      const now = Date.now();
      
      // Gunakan cache jika masih valid dan tidak force refresh
      if (!forceRefresh && controlDataCache && cacheTimestamp && (now - cacheTimestamp < CACHE_DURATION)) {
        console.log('📦 Using cached control data');
        return controlDataCache;
      }
      
      try {
        console.log('🔄 Fetching fresh control data...');
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getControl&t=${now}`);
        const data = await response.json();
        
        // Simpan ke cache
        controlDataCache = data;
        cacheTimestamp = now;
        
        console.log('✅ Control data loaded:', data);
        return data;
      } catch (error) {
        console.error('❌ Error fetching control data:', error);
        // Jika error, gunakan cache lama jika ada
        if (controlDataCache) {
          console.log('⚠️ Using stale cache due to error');
          return controlDataCache;
        }
        return null;
      }
    }

    // Variable untuk track apakah form sudah pernah ditampilkan
    let isFormInitialized = false;

    // Load control data dan tampilkan
    async function loadControlData() {
      const data = await getControlData();
      
      if (data && !data.error) {
        // Hide skeleton
        document.getElementById('title-skeleton').classList.add('hidden');
        document.getElementById('date-skeleton').classList.add('hidden');
        
        // Show dan update judul & tanggal
        const judulElement = document.getElementById('judul-rapat');
        const tanggalElement = document.getElementById('tanggal-rapat');
        
        judulElement.textContent = data.namaRapat || 'Nama Rapat';
        tanggalElement.textContent = formatTanggalIndonesia(data.tanggalRapat);
        
        judulElement.classList.remove('hidden');
        tanggalElement.classList.remove('hidden');
        
        // Cek status dan tampilkan form atau inactive screen dengan smooth transition
        const formSection = document.getElementById('form-section');
        const inactiveScreen = document.getElementById('inactive-screen');
        const headerSection = document.getElementById('header-section');
        
        if (data.statusRapat === 'ACTIVE') {
          // Tampilkan header
          headerSection.classList.remove('hidden');
          
          // Fade out inactive screen terlebih dahulu
          if (!inactiveScreen.classList.contains('hidden')) {
            inactiveScreen.style.opacity = '0';
            setTimeout(() => {
              inactiveScreen.classList.add('hidden');
              inactiveScreen.style.opacity = '1';
              // Reset form saat pindah ke halaman aktif
              document.getElementById('employee-form').reset();
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              hasSignature = false;
              // Fade in form section
              formSection.classList.remove('hidden');
              formSection.style.opacity = '0';
              setTimeout(() => {
                formSection.style.opacity = '1';
                // HANYA resize canvas jika form baru pertama kali ditampilkan
                if (!isFormInitialized) {
                  setTimeout(() => {
                    resizeCanvas();
                    setDrawingStyle();
                    isFormInitialized = true;
                  }, 100);
                }
              }, 50);
            }, 300);
          } else if (formSection.classList.contains('hidden')) {
            // Langsung tampilkan jika inactive screen sudah tersembunyi DAN form masih hidden
            // Reset form saat pindah ke halaman aktif
            document.getElementById('employee-form').reset();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hasSignature = false;
            formSection.classList.remove('hidden');
            formSection.style.opacity = '0';
            setTimeout(() => {
              formSection.style.opacity = '1';
              // HANYA resize canvas jika form baru pertama kali ditampilkan
              if (!isFormInitialized) {
                setTimeout(() => {
                  resizeCanvas();
                  setDrawingStyle();
                  isFormInitialized = true;
                }, 100);
              }
            }, 50);
          }
          // Jika form sudah tampil, tidak perlu resize canvas lagi
        } else {
          // Sembunyikan header
          headerSection.classList.add('hidden');
          
          // Fade out form section terlebih dahulu
          if (!formSection.classList.contains('hidden')) {
            formSection.style.opacity = '0';
            setTimeout(() => {
              formSection.classList.add('hidden');
              formSection.style.opacity = '1';
              // Reset form saat pindah ke halaman tidak aktif
              document.getElementById('employee-form').reset();
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              hasSignature = false;
              // Fade in inactive screen
              inactiveScreen.classList.remove('hidden');
              inactiveScreen.style.opacity = '0';
              setTimeout(() => {
                inactiveScreen.style.opacity = '1';
              }, 50);
            }, 300);
          } else {
            // Langsung tampilkan jika form section sudah tersembunyi
            inactiveScreen.classList.remove('hidden');
            inactiveScreen.style.opacity = '0';
            setTimeout(() => {
              inactiveScreen.style.opacity = '1';
            }, 50);
          }
        }
      } else {
        console.error('Error loading control data:', data?.error);
        // Tampilkan error state
        document.getElementById('title-skeleton').classList.add('hidden');
        document.getElementById('date-skeleton').classList.add('hidden');
        document.getElementById('judul-rapat').textContent = 'Error memuat data';
        document.getElementById('judul-rapat').classList.remove('hidden');
      }
    }

    // Load data saat halaman dibuka (tanpa delay)
    loadControlData();

    // Auto-refresh setiap 5 detik untuk deteksi perubahan real-time
    setInterval(() => {
      getControlData(true).then(data => {
        if (data && !data.error) {
          loadControlData();
        }
      });
    }, 5000);

    // Fungsi untuk menampilkan pesan
    function showMessage(message, type) {
      const messageContainer = document.getElementById('message-container');
      const messageElement = document.getElementById('message');
      
      messageContainer.classList.remove('hidden');
      messageElement.className = `p-4 rounded-lg shadow-lg ${
        type === 'success' ? 'bg-gradient-to-r from-green-600 to-emerald-600 border border-green-400 text-white' : 
        'bg-gradient-to-r from-red-600 to-rose-600 border border-red-400 text-white'
      }`;
      messageElement.textContent = message;
      
      setTimeout(() => {
        messageContainer.classList.add('hidden');
      }, 5000);
    }

    // Fungsi untuk mengirim data ke Google Sheets
    async function sendToGoogleSheets(data) {
      try {
        console.log('🚀 Mengirim data ke Google Apps Script...');
        console.log('📦 Data yang dikirim:', data);
        
        const response = await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(data)
        });
        
        console.log('✅ Response received');
        
        // Assume success karena CORS restriction
        return { status: 'success' };
      } catch (error) {
        console.error('❌ Error mengirim ke Google Sheets:', error);
        // Tetap return success karena error CORS normal terjadi
        return { status: 'success' };
      }
    }

    // Form submission
    document.getElementById('employee-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Langsung disable button dan tampilkan loading
      const submitBtn = document.getElementById('submit-btn');
      const submitText = document.getElementById('submit-text');
      const submitLoading = document.getElementById('submit-loading');
      
      submitBtn.disabled = true;
      submitText.classList.add('hidden');
      submitLoading.classList.remove('hidden');
      
      // Cek status rapat terlebih dahulu (gunakan cache)
      const currentControl = await getControlData();
      if (!currentControl || currentControl.statusRapat !== 'ACTIVE') {
        showMessage('Rapat sedang tidak aktif. Form tidak dapat disubmit.', 'error');
        submitBtn.disabled = false;
        submitText.classList.remove('hidden');
        submitLoading.classList.add('hidden');
        return;
      }

      // Validasi tanda tangan
      if (!hasSignature) {
        showMessage('Harap buat tanda tangan terlebih dahulu', 'error');
        submitBtn.disabled = false;
        submitText.classList.remove('hidden');
        submitLoading.classList.add('hidden');
        return;
      }

      const formData = {
        role: document.getElementById('role').value,
        nama: document.getElementById('nama').value,
        nip: document.getElementById('nip').value,
        nomor_hp: document.getElementById('nomor_hp').value,
        email: document.getElementById('email').value,
